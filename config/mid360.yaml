common:
    lid_topic:  "/livox/lidar"
    imu_topic:  "/livox/imu"
    time_sync_en: false         # ONLY turn on when external time synchronization is really not possible
    time_offset_lidar_to_imu: 0.0 # Time offset between lidar and IMU calibrated by other algorithms, e.g. LI-Init (can be found in README).
                                  # This param will take effect no matter what time_sync_en is. So if the time offset is not known exactly, please set as 0.0

preprocess:
    lidar_type: 1                # 1 for Livox serials LiDAR, 2 for Velodyne LiDAR, 3 for ouster LiDAR, 
    scan_line: 4
    blind: 0.2

mapping:
    acc_cov: 0.1
    gyr_cov: 0.1
    b_acc_cov: 0.0001
    b_gyr_cov: 0.0001
    fov_degree:    360
    det_range:     100.0
    extrinsic_est_en:  false      # true: enable the online estimation of IMU-LiDAR extrinsic
    extrinsic_T: [ -0.011, -0.02329, 0.04412 ]
    extrinsic_R: [ 1, 0, 0,
                   0, 1, 0,
                   0, 0, 1]

    grav_direction: [0.0, 0.0, -1.0]  # WHU-Helmet重力参考方向

publish:
    path_en:  false
    scan_publish_en:  true       # false: close all the point cloud output
    dense_publish_en: true       # false: low down the points number in a global-frame point clouds scan.
    scan_bodyframe_pub_en: true  # true: output the point cloud scans in IMU-body-frame

pcd_save:
    pcd_save_en: true                  # 是否在程序结束时输出累计后的最终 map.pcd；no_ref/grav_truth/ref_truth 都可用
    pcd_save_each_frame_en: false      # 是否额外输出每一帧的单独 pcd；与最终 map 保存解耦
    pcd_root_path: "/home/workspace/data/pcds"
    map_dir_path: "/home/workspace/data/ref_truth_line4.pcd" 
    interval: -1                 # how many LiDAR frames saved in each pcd file; 
                                 # -1 : all frames will be saved in ONE pcd file, may lead to memory crash when having too much frames.

ref_map:
    mode: "ref_pub_ref_truth"                      # 固定模式名：
                                         #   no_ref              : 原始 FAST-LIO 在线建图/发布模式
                                         #   ref_pub_grav_truth  : 参考图定位 + 发布 G 系点云，同时输出 /grav_truth_Odometry 与固定 /grav_truth_TWG
                                         #   ref_pub_ref_truth   : 参考图定位 + 直接发布 /ref_truth_cloud_registered、/ref_truth_Odometry 与单位阵 /ref_truth_TWW
    pcd_path: "/home/workspace/data/ref/plot1_downsample_003.pcd"  # TLS 参考地图 PCD 文件路径（位于 W/TLS 坐标系）
    map_downsample_leaf: 0.1            # 参考地图建树前的体素降采样分辨率；地图过大时可适当调大
    scan_downsample_leaf: 0.2           # 当前帧去畸变整帧点云用于匹配时的轻度降采样分辨率
    publish_map: true                   # 是否发布 /ref_map，便于在 RViz 中观察 TLS 参考地图
    frame_id: "tls_map"                # ref_ 前缀话题使用的目标坐标系名称
    # G -> W 的 4x4 外部初值矩阵T^W_G，按行主序填写
    # 前 3 行第 4 列为平移，第 4 行通常为 [0, 0, 0, 1]
    # 程序内部会自动求逆得到 T_GW，用于将 TLS 地图先转换回内部匹配坐标系
    transform_wg: [  0.058608755469,  0.998273909092,  0.003780360101, 29.239501953125,
     -0.997743666172,  0.058452539146,  0.033029742539, 36.371036529541,
      0.032751757652, -0.005707662087,  0.999447226524, -2.689183473587,
      0.000000000000,  0.000000000000,  0.000000000000,  1.000000000000 ]

